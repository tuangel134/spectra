name: Core daemon CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - name: Core daemon smoke test
        shell: bash
        run: |
          node dist/cli.js core start
          node dist/cli.js core status
          node dist/cli.js core stop
