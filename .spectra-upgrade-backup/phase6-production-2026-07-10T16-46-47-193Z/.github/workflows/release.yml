name: Release desktop binaries

# On every version tag, build the tiny native desktop window (wry/tao) for
# Linux, macOS and Windows and attach the binaries to the GitHub Release, so
# users can just download the build for their OS — no Rust toolchain needed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: spectra-desktop-linux-x86_64
            bin: spectra-desktop
          - os: macos-latest
            asset: spectra-desktop-macos-arm64
            bin: spectra-desktop
          - os: windows-latest
            asset: spectra-desktop-windows-x86_64.exe
            bin: spectra-desktop.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebView deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build native desktop
        working-directory: desktop-native
        run: cargo build --release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p out
          cp "desktop-native/target/release/${{ matrix.bin }}" "out/${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
          fail_on_unmatched_files: true
